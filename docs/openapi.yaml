components:
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: token
      description: "JWT token sent via `token: <JWT>` header"
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Not used by this backend (it expects the `token` header) (<!-- TODO: verify -->)"

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: MongoDB ObjectId

  responses:
    Unauthorized:
      description: Missing/invalid token
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: authorization invalid
    InternalServerError:
      description: Server error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Server Error

  schemas:
    BasicError:
      type: object
      properties:
        success:
          type: boolean
          nullable: true
        msg:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
        error:
          type: string
          nullable: true

    BasicSuccess:
      type: object
      properties:
        success:
          type: boolean
          example: true
        msg:
          type: string
          example: OK

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        msg:
          type: string
          example: Welcome Admin ! your login successfull
        token:
          type: string
          description: JWT token
        user:
          $ref: '#/components/schemas/User'

    CreateAdminRequest:
      type: object
      required: [name, email, password, pic]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        pic:
          type: string
          description: Profile image URL (field name used by controller)

    CreateAdminResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        msg:
          type: string
        user:
          $ref: '#/components/schemas/User'

    UserListItem:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        pic:
          type: string
          nullable: true
          description: "Returned by controller projection, but not present in current schema (<!-- TODO: verify -->)"
        photo:
          type: string
          nullable: true
          description: "Defined in the model, but not selected in the list projection (<!-- TODO: verify -->)"

    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          description: Hashed password (returned by login as currently implemented)
        photo:
          type: string
          description: Profile photo URL
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Speaker:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        specialization:
          type: array
          items:
            type: string
        imageUrl:
          type: string
        description:
          type: string
        priority:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateSpeakerRequest:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
        specialization:
          type: string
          description: Comma-separated list of specializations
          example: AI, NLP, Security
        imageUrl:
          type: string
          description: Cloudinary URL
        description:
          type: string

    UpdateSpeakerRequest:
      type: object
      required: [name, specialization, description, imageUrl]
      properties:
        name:
          type: string
        specialization:
          type: string
          description: Comma-separated list of specializations
        description:
          type: string
        imageUrl:
          type: string

    Notice:
      type: object
      properties:
        _id:
          type: string
        heading:
          type: string
        content:
          type: string
        link:
          type: string
          nullable: true
        authors:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AddNoticeRequest:
      type: object
      required: [heading, content]
      properties:
        heading:
          type: string
        content:
          type: string
        link:
          type: string
          nullable: true
        authors:
          type: string
          description: Comma-separated list of author names

    RecentUpdate:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        eventDate:
          type: string
          format: date-time
        link:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AddRecentUpdateRequest:
      type: object
      required: [title, description, eventDate]
      properties:
        title:
          type: string
        description:
          type: string
        eventDate:
          type: string
          format: date-time
          example: 2026-04-11T00:00:00.000Z
        link:
          type: string
          nullable: true

    Photo:
      type: object
      properties:
        _id:
          type: string
        imageUrl:
          type: string
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Contact:
