            schema:
              $ref: '#/components/schemas/CreateContactRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Your message has been submitted successfully.
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      tags: [Contact]
      summary: List all contact messages (admin)
      security:
