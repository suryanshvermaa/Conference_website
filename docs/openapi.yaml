                properties:
                  message:
                    type: string
                    example: Speaker added successfully
                  speaker:
                    $ref: '#/components/schemas/Speaker'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /speaker/delete/{id}:
