                properties:
                  message:
                    type: string
                    example: Speaker deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /speaker/get/{id}:
    get:
      tags: [Speakers]
      summary: Get speaker by id
      security:
        - tokenAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Speaker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Speaker'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /speaker/update/{id}:
    put:
      tags: [Speakers]
      summary: Update a speaker
      security:
        - tokenAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSpeakerRequest'
      responses:
        '201':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Speaker updated successfully
