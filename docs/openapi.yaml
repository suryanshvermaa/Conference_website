  /photogallery/all:
    get:
      tags: [Photo Gallery]
      summary: List all gallery photos
      description: Returns all photos sorted by newest first.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Photo'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /photogallery/upload:
    post:
      tags: [Photo Gallery]
      summary: Add a photo to the gallery
      description: |
        Creates a photo entry in MongoDB.

        Implementation note:
        - The route uses `upload.single('image')`, but the controller currently reads `imageUrl` from the request body.
          Typical usage is to upload the file via `POST /user/image` first, then submit the returned URL here. (<!-- TODO: verify -->)
      security:
        - tokenAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [imageUrl]
              properties:
                image:
                  type: string
                  format: binary
                  description: "Optional file (currently not read by controller) (<!-- TODO: verify -->)"
                imageUrl:
                  type: string
                  description: Cloudinary URL
                tags:
                  type: string
                  description: Comma-separated tags
                  example: campus,opening
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Photo uploaded successfully
                  photo:
                    $ref: '#/components/schemas/Photo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /photogallery/delete/{id}:
    delete:
      tags: [Photo Gallery]
      summary: Delete a gallery photo by id
      security:
        - tokenAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Photo deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

