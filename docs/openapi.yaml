openapi: 3.0.3
info:
  title: ICNARI 2026 API
  version: 1.0.0
  description: |
    REST API for the ICNARI 2026 (NIT Patna) conference website.

    Notes:
    - The backend uses JWT for protected routes, but the token is sent in a custom header named `token` (not `Authorization`).
    - Many endpoints return slightly different response shapes; this spec documents responses as implemented.
servers:
  - url: http://localhost:3000
    description: Local development server (default `PORT=3000`)
  - url: https://icnari26.nasl.in
    description: "Public site origin (API host may differ) (<!-- TODO: verify -->)"

tags:
  - name: Health
    description: Service health checks
  - name: Auth
    description: Admin login and user management
  - name: Media
    description: Cloudinary image upload/delete helpers
  - name: Speakers
    description: Speaker management
  - name: Papers
    description: Notices / papers management
  - name: Recent Updates
    description: Recent updates management
  - name: Photo Gallery
    description: Photo gallery management
  - name: Contact
    description: Contact form and admin inbox
  - name: Committees
    description: Committee member management (Organising / International / Technical / Industry Programme)

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns a basic JSON response if the server is running.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: server heathy

  /user/login:
    post:
      tags: [Auth]
      summary: Admin login
      description: |
        Validates email + password and returns a JWT token.

        The token must be sent on protected requests via the `token` header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              example:
                value:
                  email: admin@example.com
                  password: your-password
      responses:
        '200':
          description: Login result (success or failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /user/newuser:
    post:
      tags: [Auth]
      summary: Create a new admin user
      description: |
        Creates a new admin user.

        Important implementation detail:
        - The controller accepts a `pic` field, but the `User` model currently defines `photo`.
          This may mean `pic` is not persisted. (<!-- TODO: verify -->)
      security:
        - tokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdminRequest'
      responses:
        '200':
          description: Create result (success or failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAdminResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /user/Allusers:
    get:
      tags: [Auth]
      summary: List users (excluding current)
      description: |
        Returns users matching an optional name/email search.

        Query param is named `name` (used as a regex against name and email).
      security:
        - tokenAuth: []
      parameters:
        - in: query
          name: name
          schema:
            type: string
          required: false
          description: Search keyword applied to name/email (case-insensitive regex)
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserListItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          description: Failed to load users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /user/image:
    post:
      tags: [Media]
      summary: Upload an image to Cloudinary
      description: |
        Uploads an image file and returns the hosted URL.

        The file field name must be `image`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  msg:
                    type: string
                    example: " uploaded 😍"
                  result:
                    type: string
                    description: Cloudinary URL
                    example: https://res.cloudinary.com/demo/image/upload/v123/example.jpg
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [Media]
      summary: Delete an image from Cloudinary
      description: |
        Deletes an image using its URL.

        The backend derives Cloudinary `public_id` from the URL.
      security:
        - tokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [imageurl]
              properties:
                imageurl:
                  type: string
                  description: Full Cloudinary image URL
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  msg:
                    type: string
                    example: deleted successfully
                  result:
                    type: object
                    description: Cloudinary deletion response
                    additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

